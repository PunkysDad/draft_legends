spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/draft_legends
    username: draft_legends_user
    password: draft_legends_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}

apple:
  bundleId: ${APPLE_BUNDLE_ID:com.draftlegends.app}

# Google OAuth client ID — must be set via GOOGLE_CLIENT_ID env var in production
google:
  clientId: ${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}
