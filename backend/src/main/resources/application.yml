spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/draft_legends
    username: draft_legends_user
    password: draft_legends_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
